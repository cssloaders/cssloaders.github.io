<body>
    <header>
        <div class="brand-container">
            <span class="brand">L &nbsp; aders</span>
        </div>
        <nav>
            <a class="nav-btn" target="_blank" href="https://codepen.io/vineethtrv/pen/NWxZqMM" title="See on CodePen">

            </a>
            <a class="nav-btn" target="_blank" href="https://github.com/vineethtrv/css-loader" title="See on GitHub">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path></svg>

    <section class="hero">
        <h1 class="brand">L &nbsp; aders</h1>
        <p>A library of lightweight, customizable loading animations in pure CSS. Click an animation to get the code.</p>
    </section>

    <main id="main"></main>

    <footer>
        <a href="https://vineethtrv.github.io/" target="_blank">
            <span>👨‍💻</span> Created by Vineeth TR, modernized by danbenba
        </a>
    </footer>

    <div class="overlay">
        <div class="popup">
            <button class="btn-close">&times;</button>
            <div class="popup-header">
                <h2>Preview & Code</h2>
            </div>
            <div class="showcase"></div>
            <div class="code-content">
                <div class="code-area">
                    <div class="code-header">
                        <span>HTML</span>
                        <div class="button-group">
                            <button class="btn-action btn-edit" data-type="html">Edit</button>
                            <button class="btn-action copy" data-id="markup">Copy</button>
                        </div>
                    </div>
                    <pre><code id="markup"></code></pre>
                </div>
                <div class="code-area">
                    <div class="code-header">
                        <span>CSS</span>
                         <div class="button-group">
                            <button class="btn-action btn-edit" data-type="css">Edit</button>
                            <button class="btn-action copy" data-id="css">Copy</button>
                        </div>
                    </div>
                    <pre><code id='css'></code></pre>
                </div>
            </div>
        </div>
    </div>

    <div id="editor-overlay" class="overlay">
        <div class="editor-popup">
            <button id="editor-close" class="btn-close">&times;</button>
            <div class="editor-header">
                <h2>Live Editor</h2>
            </div>
            <div class="editor-main">
                <div class="editor-fields">
                    <div class="editor-field">
                        <label for="editor-html">HTML</label>
                        <textarea id="editor-html"></textarea>
                    </div>
                    <div class="editor-field">
                        <label for="editor-css">CSS</label>
                        <textarea id="editor-css"></textarea>
                    </div>
                </div>
                <div class="editor-preview-wrapper">
                    <label>Live Preview</label>
                    <div id="editor-preview"></div>
                </div>
            </div>
            <div class="editor-actions">
                <button class="btn-action" id="copy-html-edited">Copy HTML</button>
                <button class="btn-action" id="copy-css-edited">Copy CSS</button>
                <button class="btn-action" id="download-css">Download CSS</button>
                <button class="btn-action primary" id="download-zip">Download ZIP</button>
            </div>
        </div>
    </div>

    <script type="module" src="./js/app.js"></script>
</body>
</html>
